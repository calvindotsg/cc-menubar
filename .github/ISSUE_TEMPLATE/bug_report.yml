name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cc-menubar version
      description: Output of `cc-menubar --version`
      placeholder: "e.g. 0.2.1"
    validations:
      required: true
  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - "13 Ventura"
        - "14 Sonoma"
        - "15 Sequoia"
        - "16+"
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Homebrew
        - uv
        - pip
    validations:
      required: true
  - type: input
    id: swiftbar
    attributes:
      label: SwiftBar / xbar version
      description: Optional — output of SwiftBar > About or xbar version.
      placeholder: "e.g. SwiftBar 2.0.0"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output / screenshots
      description: Paste any error messages or attach screenshots.
    validations:
      required: false
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Output of `cc-menubar config` (optional, helps diagnose config-related issues).
      render: toml
    validations:
      required: false
